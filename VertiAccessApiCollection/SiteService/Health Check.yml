info:
    name: Health Check
    type: http
    seq: 1

http:
    method: GET
    url: '{{baseUrl}}/v1/sites/health'
    headers:
        - name: Content-Type
          value: application/json

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Site Service Health Check
    Simple health check endpoint to verify the site service is running and reachable.
