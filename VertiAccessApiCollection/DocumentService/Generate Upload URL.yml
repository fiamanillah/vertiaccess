info:
  name: Generate Upload URL
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/documents/v1/upload-url"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  body:
    type: json
    data: |-
      {
        "fileName": "ownership.pdf",
        "contentType": "application/pdf",
        "documentType": "ownership",
        "siteId": "{{siteId}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Generate Upload URL
  Creates a presigned S3 upload URL for a site document or image.
