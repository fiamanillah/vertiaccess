http:
    method: POST
    url: '{{baseUrl}}/documents/v1/register'
    headers:
        - name: Content-Type
          value: application/json
    body:
        type: json
        data: |-
            {
              "fileKey": "sites/example/file-key.pdf",
              "fileName": "ownership.pdf",
              "fileSize": "128000",
              "category": "SITE_OWNERSHIP",
              "entityId": "some-site-id"
            }

