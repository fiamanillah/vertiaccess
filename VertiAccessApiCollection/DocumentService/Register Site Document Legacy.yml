info:
  name: Register Site Document Legacy
  type: http
  seq: 14

http:
  method: POST
  url: "{{baseUrl}}/documents/v1/sites/v1/:siteId/documents"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "fileKey": "sites/example/file-key.pdf",
        "fileName": "ownership.pdf",
        "fileSize": "128000",
        "documentType": "SITE_OWNERSHIP"
      }

docs: |-
  ## Register Site Document (Legacy Alias)
  An alias that registers site documents under the legacy path for backwards compatibility with the frontend.
