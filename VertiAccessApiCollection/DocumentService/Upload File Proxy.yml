info:
  name: Upload File Proxy
  type: http
  seq: 13

http:
  method: PUT
  url: "{{baseUrl}}/documents/v1/upload-file"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
  body:
    type: multipart-form

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Upload File Proxy
  Proxies a file upload to S3 using a pre-signed URL or direct upload path.
