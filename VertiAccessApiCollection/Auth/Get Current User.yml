http:
  method: GET
  url: "{{baseUrl}}/auth/v1/me"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.REPLACE_WITH_ACTUAL_ACCESS_TOKEN

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
