info:
  name: Reset Password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/auth/v1/reset-password"
  auth: none
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "john.doe@example.com",
        "code": "123456",
        "newPassword": "NewSecurePass1"
      }
docs: |-
  ## Reset Password
  Resets the user's password using the 6-digit code received from the forgot-password flow.
