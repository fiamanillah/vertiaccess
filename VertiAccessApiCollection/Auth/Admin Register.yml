info:
  name: Admin Register
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/auth/v1/admin/register"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{auth_token}}"
  body:
    type: json
    data: |-
      {
        "email": "new.admin@example.com",
        "firstName": "New",
        "lastName": "Admin",
        "password": "SecurePass1",
        "role": "admin"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Register a New Admin User

  Creates a new admin user account. **Requires an existing admin to be authenticated.**

  ### Request Body

  | Field      | Type   | Required | Description                                         |
  |------------|--------|----------|-----------------------------------------------------|
  | email      | string | Yes      | Valid email address (used as username)               |
  | firstName  | string | Yes      | Min 2 characters                                    |
  | lastName   | string | Yes      | Min 2 characters                                    |
  | password   | string | Yes      | Min 8 chars, must include uppercase + number         |
  | role       | string | No       | Must be `"admin"` (default is `"admin"`)            |
