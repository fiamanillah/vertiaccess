info:
    name: Admin Stats
    type: http
    seq: 12

http:
    method: GET
    url: '{{baseUrl}}/auth/v1/admin/stats'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Admin Stats

    Retrieves administrative statistics including user counts, verification statistics, and platform metrics.

    **Admin Only**
