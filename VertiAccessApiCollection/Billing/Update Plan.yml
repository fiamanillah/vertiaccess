info:
  name: Update Plan
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/billing/v1/plans/:planId"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{idToken}}"
  body:
    type: json
    data: |-
      {
        "monthlyPrice": 1600
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
