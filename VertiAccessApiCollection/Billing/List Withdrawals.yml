info:
    name: List Withdrawals
    type: http
    seq: 21

http:
    method: GET
    url: '{{baseUrl}}/billing/v1/landowner/withdrawals'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## List Withdrawals

    Retrieves all withdrawal requests for the authenticated landowner.
