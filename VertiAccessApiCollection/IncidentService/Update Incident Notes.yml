info:
    name: Update Incident Notes
    type: http
    seq: 9

http:
    method: PATCH
    url: '{{baseUrl}}/incidents/v1/:incidentId/notes'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{auth_token}}'
    body:
        type: json
        data: |-
            {
              "adminNotes": "Admin notes about the incident investigation"
            }

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Update Incident Notes

    Updates admin notes for an incident. Admin use only.

    ### Path Parameters

    | Parameter  | Type   | Required | Description      |
    |------------|--------|----------|-------------------|
    | incidentId | string | Yes      | ID of the incident |

    ### Request Body

    | Field | Type   | Required | Description      |
    |-------|--------|----------|-------------------|
    | notes | string | Yes      | Admin notes       |
