info:
    name: Update Incident Status
    type: http
    seq: 6

http:
    method: PATCH
    url: '{{baseUrl}}/incidents/v1/:incidentId/status'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{auth_token}}'
    body:
        type: json
        data: |-
            {
              "status": "RESOLVED",
              "adminNotes": "Investigation complete and case closed."
            }

vars:
    incidentId:

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Update Incident Status

    Updates the incident lifecycle status. This endpoint is intended for admin workflows.
