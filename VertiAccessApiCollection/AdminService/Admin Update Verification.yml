info:
  name: Admin Update Verification
  type: http
  seq: 16

http:
  method: PUT
  url: "{{baseUrl}}/admin/v1/verifications/:id"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}
  body:
    type: json
    data: |-
      {
        "status": "APPROVED",
        "adminNote": "All documents are in order."
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Admin: Update Verification
  Approves or rejects a verification request.

  ### Request Body
  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | status | string | Yes | Either `"APPROVED"` or `"REJECTED"` |
  | adminNote | string | No | Optional note explaining the decision |
