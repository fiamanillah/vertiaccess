info:
  name: Reinstate User
  type: http
  seq: 15

http:
  method: POST
  url: "{{baseUrl}}/admin/v1/users/:userId/reinstate"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{auth_token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Reinstate User

  Reinstates a previously suspended user account. Admin only operation.

  ### Path Parameters

  | Parameter | Type   | Required | Description        |
  |-----------|--------|----------|--------------------|
  | userId    | string | Yes      | User ID to reinstate |

  **Admin Only**
