    url: '{{baseUrl}}/payments/v1/assetowner/balance'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## AssetOwner Balance

    Retrieves the current account balance available for withdrawal for the authenticated assetowner.
