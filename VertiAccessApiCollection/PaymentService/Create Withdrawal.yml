info:
    name: Create Withdrawal
    type: http
    seq: 20

http:
    method: POST
    url: '{{baseUrl}}/payments/v1/landowner/withdrawals'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'
    body:
        type: json
        data: |-
            {
              "amount": 500.00,
              "description": "Monthly earnings withdrawal"
            }

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Create Withdrawal

    Creates a new withdrawal request from the landowner's balance to their connected Stripe account.

    ### Request Body

    | Field       | Type   | Required | Description                    |
    |-------------|--------|----------|--------------------------------|
    | amount      | number | Yes      | Amount to withdraw (in dollars) |
    | description | string | No       | Optional withdrawal description |
