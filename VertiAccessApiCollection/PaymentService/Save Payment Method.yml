info:
  name: Save Payment Method
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/payments/v1/payment-methods"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{auth_token}}"
  body:
    type: json
    data: |-
      {
        "paymentMethodId": "pm_123abc456def",
        "setAsDefault": true
      }

docs: |-
  ## Save Payment Method
  Attaches a Stripe payment method to the user's customer record.

  ### Request Body
  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | paymentMethodId | string | Yes | The Stripe Payment Method ID |
  | setAsDefault | boolean | No | Whether to set this as the default card (default: `false`) |
