info:
    name: Get Withdrawal Details
    type: http
    seq: 22

http:
    method: GET
    url: '{{baseUrl}}/payments/v1/landowner/withdrawals/:withdrawalId'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Get Withdrawal Details

    Retrieves detailed information about a specific withdrawal request.

    ### Path Parameters

    | Parameter    | Type   | Required | Description              |
    |--------------|--------|----------|--------------------------|
    | withdrawalId | string | Yes      | ID of the withdrawal |
