info:
    name: Cancel Withdrawal
    type: http
    seq: 23

http:
    method: POST
    url: '{{baseUrl}}/payments/v1/landowner/withdrawals/:withdrawalId/cancel'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Cancel Withdrawal

    Cancels a pending withdrawal request. Can only cancel withdrawals that haven't been processed yet.

    ### Path Parameters

    | Parameter    | Type   | Required | Description              |
    |--------------|--------|----------|--------------------------|
    | withdrawalId | string | Yes      | ID of the withdrawal to cancel |
