info:
    name: Get Incident
    type: http
    seq: 4

http:
    method: GET
    url: '{{baseUrl}}/incident-queries/v1/:incidentId'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{auth_token}}'

vars:
    incidentId:

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Get Incident

    Fetches a single incident case, including its messages and supporting documents.
