info:
    name: List Site Incidents
    type: http
    seq: 3

http:
    method: GET
    url: '{{baseUrl}}/incident-queries/v1/site/:siteId'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{auth_token}}'

vars:
    siteId:

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## List Site Incidents

    Returns all incidents recorded against a single site.
    Access is limited to the site assetowner or an admin.
