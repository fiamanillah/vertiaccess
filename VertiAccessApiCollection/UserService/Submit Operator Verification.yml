info:
  name: Submit Operator Verification
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}/users/v1/me/operator-verification"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{token}}"
  body:
    type: json
    data: |-
      {
        "supportingDocuments": [
          {
            "fileKey": "operator-docs/flyer-id-cert.pdf",
            "fileName": "CAA-Flyer-ID.pdf"
          }
        ]
      }

docs: |-
  ## Submit Operator Verification
  Submits registered credentials (flyerId, operatorReference) for review.
  Optionally accepts supporting documents. The Flyer ID and Operator Reference are pulled from the user's existing profile.

  ### Request Body
  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | supportingDocuments | array | No | List of objects with `fileKey` and `fileName` |
