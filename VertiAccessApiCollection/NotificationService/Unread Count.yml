info:
    name: Unread Count
    type: http
    seq: 3

http:
    method: GET
    url: '{{baseUrl}}/notifications/v1/unread-count'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: Bearer {{idToken}}

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Unread Notification Count
    Returns the count of unread notifications for the authenticated user.
