info:
    name: Cancel Subscription
    type: http
    seq: 17

http:
    method: POST
    url: '{{baseUrl}}/billing/v1/subscriptions/cancel'
    headers:
        - name: Content-Type
          value: application/json
        - name: Authorization
          value: 'Bearer {{idToken}}'

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

docs: |-
    ## Cancel Subscription

    Cancels the user's active subscription plan immediately.
